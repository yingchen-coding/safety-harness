name: PR Review Gate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  pr-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip pytest ruff
      - run: if [ -f pyproject.toml ]; then python -m pip install -e '.[dev]' || true; fi
      - run: if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
      - run: find . -mindepth 2 -maxdepth 2 -name requirements.txt -print -exec python -m pip install -r {} \;
      - run: scripts/pr_review_check.sh
